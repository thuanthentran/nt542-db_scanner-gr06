---
# Playbook riêng để chỉ chạy audit (không remediate)
# Sử dụng: ansible-playbook playbook/audit-only.yml -i inventory/hosts.ini

- name: "Run Audit Only - No Remediation"
  hosts: db_servers
  gather_facts: true
  remote_user: "{{ ansible_user | default('Administrator') }}"
  
  vars_files:
    - vars/main.yml
    - vars/{{ environment | default('prod') }}.yml

  pre_tasks:
    - name: "Verify target hosts are reachable"
      ansible.windows.win_ping:
  
  roles:
    - role: common
      tags: ['always']
    - role: deploy
      tags: ['deploy']
    - role: audit
      tags: ['audit']
    - role: reporting
      tags: ['reporting']
  
  tags:
    - audit
    - never
