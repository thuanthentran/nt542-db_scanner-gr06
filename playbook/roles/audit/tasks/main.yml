---
# Tasks thực hiện audit
- name: "Create audit working directory"
  ansible.windows.win_file:
    path: "{{ report_dir }}\\audit_{{ ansible_date_time.iso8601 | replace(':', '-') }}"
    state: directory
  register: audit_dir
- name: "Run full audit scan"
  ansible.windows.win_command:
    cmd: |
      {{ venv_path }}\Scripts\python.exe {{ app_home }}\db_scan.py
      --output-dir {{ audit_dir.path }}
      --format json,html,csv
      --timeout {{ audit_timeout }}
      --log-level {{ log_level }}
    creates: "{{ audit_dir.path }}\\audit_results.json"
  environment:
    PYTHONPATH: "{{ app_home }}"
    DB_SERVER: "{{ inventory_hostname }}"
    DB_INSTANCE: "{{ db_instance | default('SQLEXPRESS') }}"
  register: audit_execution
  timeout: "{{ audit_timeout + 60 }}"
  ignore_errors: yes

- name: "Set audit status"
  set_fact:
    audit_status: "{{ 'SUCCESS' if audit_execution.rc == 0 else 'FAILED' }}"
    audit_results_path: "{{ audit_dir.path }}"

- name: "Parse audit results"
  ansible.windows.win_stat:
    path: "{{ audit_dir.path }}\\audit_results.json"
  register: audit_results_file

- name: "Read audit summary"
  ansible.windows.win_slurp:
    src: "{{ audit_dir.path }}\\audit_results.json"
  register: audit_results_content
  when: audit_results_file.stat.exists

- name: "Display audit summary"
  debug:
    msg:
      - "Audit Status: {{ audit_status }}"
      - "Results stored at: {{ audit_dir.path }}"
      - "Execution time: {{ audit_execution.end | default('N/A') }}"
  when: audit_results_file.stat.exists

- name: "Generate audit report"
  ansible.windows.win_template:
    src: audit_report.html.j2
    dest: "{{ audit_dir.path }}\\audit_report.html"
  vars:
    audit_timestamp: "{{ ansible_date_time.iso8601 }}"
    audit_hostname: "{{ inventory_hostname }}"
    audit_status_info: "{{ audit_status }}"

- name: "Compress audit results"
  ansible.windows.win_shell: |
    $src = "{{ audit_dir.path }}"
    $dst = "{{ audit_dir.path }}.zip"
    if (Test-Path -Path $dst) { Remove-Item -Path $dst -Force }
    Compress-Archive -Path $src -DestinationPath $dst -Force
    Write-Output $dst
  register: audit_archive

- name: "Create audit task summary"
  set_fact:
    audit_summary:
      status: "{{ audit_status }}"
      timestamp: "{{ ansible_date_time.iso8601 }}"
      server: "{{ inventory_hostname }}"
      results_path: "{{ audit_dir.path }}"
      archive_path: "{{ audit_dir.path }}.zip"
      findings: "{{ (audit_results_content.content | b64decode | from_json).findings | default(0) if audit_results_file.stat.exists else 'N/A' }}"
