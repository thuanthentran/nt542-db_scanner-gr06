---
# Tasks triển khai ứng dụng
- name: "Copy scanner application from control node"
  ansible.windows.win_copy:
    src: "{{ source_path }}/"
    dest: "{{ app_home }}\\src"
  register: copy_result

- name: "Create Python virtual environment"
  ansible.windows.win_command: "python -m venv {{ venv_path }}"
  args:
    creates: "{{ venv_path }}\\Scripts\\activate.bat"

- name: "Upgrade pip/setuptools/wheel in virtualenv"
  ansible.windows.win_command: >-
    {{ venv_path }}\\Scripts\\python.exe -m pip install --upgrade pip setuptools wheel
  register: pip_bootstrap
  changed_when: "'Requirement already satisfied' not in (pip_bootstrap.stdout | default(''))"

- name: "Install Python dependencies"
  ansible.windows.win_command: >-
    {{ venv_path }}\\Scripts\\python.exe -m pip install -r {{ app_home }}\\src\\requirements.txt
  register: pip_result
  changed_when: "'Requirement already satisfied' not in (pip_result.stdout | default(''))"

- name: "Copy main scanner script"
  ansible.windows.win_copy:
    src: "{{ source_path }}/db_scan.py"
    dest: "{{ app_home }}\\db_scan.py"

- name: "Copy scanner modules"
  ansible.windows.win_copy:
    src: "{{ source_path }}/scanner/"
    dest: "{{ app_home }}\\scanner\\"

- name: "Create configuration file"
  ansible.windows.win_template:
    src: db_scanner_config.j2
    dest: "{{ app_home }}\\config.ini"
  vars:
    db_server: "{{ inventory_hostname }}"
    db_instance: "{{ db_instance | default('SQLEXPRESS') }}"

- name: "Create wrapper script"
  ansible.windows.win_template:
    src: run_scanner.ps1.j2
    dest: "{{ app_home }}\\run_scanner.ps1"

- name: "Verify deployment"
  ansible.windows.win_command: "{{ venv_path }}\\Scripts\\python.exe -m py_compile {{ app_home }}\\db_scan.py"
  changed_when: false

- name: "Set deployment status"
  set_fact:
    deployment_status: "SUCCESS"
  when: pip_result is succeeded and copy_result is succeeded

- name: "Display deployment info"
  debug:
    msg:
      - "Application deployed to: {{ app_home }}"
      - "Python version: {{ ansible_python_version }}"
      - "Virtual environment: {{ venv_path }}"
