---
# Tasks chung cho tất cả roles (Windows targets)
- name: "Validate Python is available on target"
  ansible.windows.win_command: "python --version"
  register: python_check
  changed_when: false
  failed_when: python_check.rc != 0

- name: "Create necessary directories"
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ app_home }}"
    - "{{ log_dir }}"
    - "{{ backup_dir }}"
    - "{{ report_dir }}"

- name: "Ensure scanner log file exists"
  ansible.windows.win_copy:
    dest: "{{ log_dir }}\\scanner.log"
    content: ""
    force: false
