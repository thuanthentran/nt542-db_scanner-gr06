---
# Tasks chung cho tất cả roles
- name: "Update package manager"
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: "Install basic dependencies"
  package:
    name: "{{ item }}"
    state: present
  loop:
    - curl
    - wget
    - python3
    - python3-pip
    - python3-venv
    - sudo
  register: packages_installed
  changed_when: packages_installed.changed

- name: "Create application user"
  user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    groups: "{{ app_group }},sudo"
    home: "{{ app_home }}"
    shell: /bin/bash
    state: present

- name: "Create necessary directories"
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0755'
  loop:
    - "{{ app_home }}"
    - "{{ log_dir }}"
    - "{{ backup_dir }}"
    - "{{ report_dir }}"

- name: "Set up logging"
  template:
    src: logrotate.j2
    dest: /etc/logrotate.d/db_scanner
    owner: root
    group: root
    mode: '0644'
